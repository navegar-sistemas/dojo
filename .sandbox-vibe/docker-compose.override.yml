# Override generated by sandbox-vibe.
# Edit only with full understanding — this file may be regenerated by 'sandbox-vibe init'.

name: dojo

services:
  sandbox:
    image: sandbox-vibe:dojo
    build:
      context: .
      dockerfile: Dockerfile.sandbox.override
    # Remove os limites por-container do base (cpus/memory/pids). O Docker
    # Desktop ja limita CPU/RAM globalmente, entao o container usa o que estiver
    # disponivel. (Evita o EAGAIN do claude por estouro de pids.)
    deploy:
      resources:
        limits: !reset null
    volumes:
      - sandbox-vibe_dojo-sandbox-home:/home/sandbox
      - ..:/workspace

    entrypoint:
      - /bin/bash
      - -c
      - |
        set -e
        set -o pipefail

        mkdir -p ~/.claude
        cat > ~/.claude/settings.json << 'EOF'
        {
          "permissions": {
            "additionalDirectories": [
              "/workspace"
            ]
          },
          "enabledPlugins": {
            "security-guidance@claude-plugins-official": true,
            "commit-commands@claude-plugins-official": true,
            "code-review@claude-plugins-official": true,
            "pr-review-toolkit@claude-plugins-official": true,
            "claude-md-management@claude-plugins-official": true,
            "hookify@claude-plugins-official": true,
            "feature-dev@claude-plugins-official": true,
            "superpowers@superpowers-dev": true
          }
        }
        EOF

        if [ ! -f ~/.claude/.bootstrap-05152dc5174c3a74 ]; then
          BOOT_LOG=~/.sandbox-vibe-bootstrap.log
          : > "$$BOOT_LOG"
          chmod 600 "$$BOOT_LOG"
          echo "[sandbox] First run: installing marketplaces, plugins and MCPs..."

          claude plugin marketplace add anthropics/claude-plugins-official >>"$$BOOT_LOG" 2>&1 || true
          claude plugin marketplace add obra/superpowers >>"$$BOOT_LOG" 2>&1 || true

          for p in \
            "security-guidance@claude-plugins-official" \
            "commit-commands@claude-plugins-official" \
            "code-review@claude-plugins-official" \
            "pr-review-toolkit@claude-plugins-official" \
            "claude-md-management@claude-plugins-official" \
            "hookify@claude-plugins-official" \
            "feature-dev@claude-plugins-official" \
            "superpowers@superpowers-dev"; do
            echo "[sandbox] install: $$p"
            claude plugin install "$$p" >>"$$BOOT_LOG" 2>&1
          done

          touch ~/.claude/.bootstrap-05152dc5174c3a74
          echo "[sandbox] Bootstrap done. Log at $$BOOT_LOG (chmod 600)."
        fi

        if [ -t 0 ]; then
          if [ "$$SANDBOX_VIBE_MODE" = "shell" ]; then
            exec bash -l
          else
            exec claude --dangerously-skip-permissions
          fi
        else
          echo "[sandbox] No interactive TTY; exiting after bootstrap. Use 'sandbox-vibe up' (or 'sandbox-vibe up --shell') in a terminal."
        fi
    command: []

volumes:
  # The `sandbox-vibe_` prefix is the legacy Compose project name; pinning `name:`
  # keeps the real volume stable and reuses pre-existing volumes (no migration).
  sandbox-vibe_dojo-sandbox-home:
    name: sandbox-vibe_dojo-sandbox-home
